<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign In — Chicken Wings</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍗</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #07070c; --surface: #0e0e18; --card: #121220;
      --border: #1e1e32; --border-hi: #2e2e48;
      --text: #e2e2f0; --muted: #5a5a7a; --muted-hi: #8888aa;
      --accent: #f5a623; --accent-dim: rgba(245,166,35,0.12);
      --green: #10b981; --red: #ef4444; --red-dim: rgba(239,68,68,0.12);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Plus Jakarta Sans', sans-serif; font-size: 14px; line-height: 1.5;
      min-height: 100vh; display: flex; flex-direction: column;
    }
    body::after {
      content: ''; position: fixed; top: -200px; right: -200px;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(245,166,35,0.06) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }

    .top-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 2rem; height: 56px;
      border-bottom: 1px solid var(--border);
      background: rgba(7,7,12,0.9); backdrop-filter: blur(16px);
      position: sticky; top: 0; z-index: 10;
    }
    .logo { display: flex; align-items: center; gap: 0.6rem; text-decoration: none; }
    .logo-icon { width: 28px; height: 28px; background: var(--accent); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 15px; }
    .logo-text { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 15px; letter-spacing: 0.05em; color: var(--text); }
    .logo-text span { color: var(--accent); }
    .top-link { font-size: 13px; color: var(--muted-hi); text-decoration: none; transition: color 0.15s; }
    .top-link:hover { color: var(--accent); }

    .page { flex: 1; display: flex; align-items: center; justify-content: center; padding: 3rem 1.5rem; position: relative; z-index: 1; }

    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 2.5rem; width: 100%; max-width: 420px;
    }
    .card-title { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; margin-bottom: 0.4rem; }
    .card-sub { font-size: 13px; color: var(--muted-hi); margin-bottom: 2rem; }
    .card-sub a { color: var(--accent); text-decoration: none; font-weight: 600; }
    .card-sub a:hover { text-decoration: underline; }

    .field { margin-bottom: 1.1rem; }
    .field label { display: block; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted-hi); margin-bottom: 0.4rem; font-family: 'JetBrains Mono', monospace; }
    .field input {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      color: var(--text); padding: 0 0.9rem; height: 40px; border-radius: 7px;
      font-size: 14px; font-family: 'Plus Jakarta Sans', sans-serif;
      outline: none; transition: border-color 0.15s;
    }
    .field input:focus { border-color: var(--accent); }
    .field input::placeholder { color: var(--muted); }

    .remember-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
    .check-label { display: flex; align-items: center; gap: 0.5rem; cursor: pointer; font-size: 13px; color: var(--muted-hi); }
    .check-label input[type=checkbox] { accent-color: var(--accent); width: 14px; height: 14px; }
    .forgot-link { font-size: 12px; color: var(--muted-hi); text-decoration: none; transition: color 0.15s; }
    .forgot-link:hover { color: var(--accent); }

    .btn-submit {
      width: 100%; height: 42px; background: var(--accent); color: #000;
      border: none; border-radius: 7px; font-weight: 700; font-size: 14px;
      cursor: pointer; transition: background 0.15s; letter-spacing: 0.02em;
    }
    .btn-submit:hover { background: #fbbf24; }

    .error-box {
      background: var(--red-dim); border: 1px solid var(--red); color: var(--red);
      border-radius: 7px; padding: 0.75rem 1rem; font-size: 13px; margin-bottom: 1.5rem;
    }

    .divider { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }

    .sso-divider { display: flex; align-items: center; gap: 0.75rem; margin: 1.5rem 0; }
    .sso-divider span { font-size: 11px; color: var(--muted); white-space: nowrap; text-transform: uppercase; letter-spacing: 0.08em; }
    .sso-divider::before, .sso-divider::after { content: ''; flex: 1; border-top: 1px solid var(--border); }

    .sso-btn {
      display: flex; align-items: center; justify-content: center; gap: 0.6rem;
      width: 100%; height: 40px; border-radius: 7px; font-size: 13px; font-weight: 600;
      cursor: pointer; text-decoration: none; transition: background 0.15s, border-color 0.15s;
      border: 1px solid var(--border-hi); background: var(--bg); color: var(--text);
      margin-bottom: 0.6rem;
    }
    .sso-btn:hover { background: var(--border); border-color: var(--muted); }
    .sso-btn svg { flex-shrink: 0; }
  </style>
</head>
<body>

<div class="top-bar">
  <a href="/" class="logo">
    <div class="logo-icon">🍗</div>
    <span class="logo-text">CHICKEN<span>.</span>WINGS</span>
  </a>
  <a href="/auth/signup" class="top-link">No account? Sign up →</a>
</div>

<div class="page">
  <div class="card">
    <h1 class="card-title">Sign in</h1>
    <p class="card-sub">New here? <a href="/auth/signup">Create an account</a></p>

    {% if error %}
    <div class="error-box">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/auth/login{% if request.args.get('next') %}?next={{ request.args.get('next') }}{% endif %}">
      <div class="field">
        <label>Email</label>
        <input type="email" name="email" placeholder="you@example.com" autocomplete="email" required
               value="{{ request.form.get('email', '') }}">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
      </div>
      <div class="remember-row">
        <label class="check-label">
          <input type="checkbox" name="remember"> Remember me
        </label>
        <a href="/auth/forgot-password" class="forgot-link">Forgot password?</a>
      </div>
      <button type="submit" class="btn-submit">Sign in</button>
    </form>

    <div class="sso-divider"><span>or continue with</span></div>

    <a href="/auth/google" class="sso-btn">
      <svg width="18" height="18" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Continue with Google
    </a>

    <a href="/auth/github" class="sso-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"/>
      </svg>
      Continue with GitHub
    </a>
  </div>
</div>

</body>
</html>
