<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Forgot Password — Chicken Wings</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍗</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#07070c; --surface:#0e0e18; --border:#1e1e32; --text:#e2e2f0; --muted:#5a5a7a; --muted-hi:#8888aa; --accent:#f5a623; --green:#10b981; --green-dim:rgba(16,185,129,0.12); }
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    body { background:var(--bg); color:var(--text); font-family:'Plus Jakarta Sans',sans-serif; font-size:14px; min-height:100vh; display:flex; flex-direction:column; }
    body::after { content:''; position:fixed; top:-200px; right:-200px; width:500px; height:500px; background:radial-gradient(circle,rgba(245,166,35,0.06) 0%,transparent 70%); pointer-events:none; z-index:0; }
    .top-bar { display:flex; align-items:center; justify-content:space-between; padding:0 2rem; height:56px; border-bottom:1px solid var(--border); background:rgba(7,7,12,0.9); backdrop-filter:blur(16px); position:sticky; top:0; z-index:10; }
    .logo { display:flex; align-items:center; gap:0.6rem; text-decoration:none; }
    .logo-icon { width:28px; height:28px; background:var(--accent); border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:15px; }
    .logo-text { font-family:'Syne',sans-serif; font-weight:800; font-size:15px; letter-spacing:0.05em; color:var(--text); }
    .logo-text span { color:var(--accent); }
    .top-link { font-size:13px; color:var(--muted-hi); text-decoration:none; transition:color 0.15s; }
    .top-link:hover { color:var(--accent); }
    .page { flex:1; display:flex; align-items:center; justify-content:center; padding:3rem 1.5rem; position:relative; z-index:1; }
    .card { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:2.5rem; width:100%; max-width:420px; }
    .card-title { font-family:'Syne',sans-serif; font-size:22px; font-weight:800; margin-bottom:0.4rem; }
    .card-sub { font-size:13px; color:var(--muted-hi); margin-bottom:2rem; }
    .field { margin-bottom:1.25rem; }
    .field label { display:block; font-size:12px; font-weight:600; text-transform:uppercase; letter-spacing:0.07em; color:var(--muted-hi); margin-bottom:0.4rem; font-family:'JetBrains Mono',monospace; }
    .field input { width:100%; background:var(--bg); border:1px solid var(--border); color:var(--text); padding:0 0.9rem; height:40px; border-radius:7px; font-size:14px; outline:none; transition:border-color 0.15s; }
    .field input:focus { border-color:var(--accent); }
    .field input::placeholder { color:var(--muted); }
    .btn-submit { width:100%; height:42px; background:var(--accent); color:#000; border:none; border-radius:7px; font-weight:700; font-size:14px; cursor:pointer; transition:background 0.15s; }
    .btn-submit:hover { background:#fbbf24; }
    .success-box { background:var(--green-dim); border:1px solid var(--green); color:var(--green); border-radius:7px; padding:0.75rem 1rem; font-size:13px; margin-bottom:1.5rem; }
    .back-link { display:block; text-align:center; margin-top:1.25rem; font-size:13px; color:var(--muted-hi); text-decoration:none; }
    .back-link:hover { color:var(--accent); }
  </style>
</head>
<body>
<div class="top-bar">
  <a href="/" class="logo"><div class="logo-icon">🍗</div><span class="logo-text">CHICKEN<span>.</span>WINGS</span></a>
  <a href="/auth/login" class="top-link">← Back to login</a>
</div>
<div class="page">
  <div class="card">
    <h1 class="card-title">Forgot password?</h1>
    <p class="card-sub">Enter your email and we'll send you a reset link.</p>
    {% if sent %}
    <div class="success-box">If that email is registered, a reset link has been sent. Check your inbox (and spam).</div>
    <a href="/auth/login" class="back-link">← Back to login</a>
    {% else %}
    <form method="POST" action="/auth/forgot-password">
      <div class="field">
        <label>Email</label>
        <input type="email" name="email" placeholder="you@example.com" autocomplete="email" required>
      </div>
      <button type="submit" class="btn-submit">Send reset link</button>
    </form>
    <a href="/auth/login" class="back-link">← Back to login</a>
    {% endif %}
  </div>
</div>
</body>
</html>
