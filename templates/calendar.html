<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Calendrier Promotionnel — Chicken Wings</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍗</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #07070c; --surface: #0e0e18; --card: #121220; --card-hover: #16162a;
      --border: #1e1e32; --border-hi: #2e2e48;
      --text: #e2e2f0; --muted: #5a5a7a; --muted-hi: #8888aa;
      --accent: #f5a623; --accent-dim: rgba(245,166,35,0.12); --accent-glow: rgba(245,166,35,0.25);
      --green: #10b981; --green-dim: rgba(16,185,129,0.12);
      --red: #ef4444; --red-dim: rgba(239,68,68,0.12);
      --blue: #6366f1;
    }
    [data-theme="light"] {
      --bg: #f4f4f8; --surface: #ffffff; --card: #ffffff; --card-hover: #f8f8fc;
      --border: #e0e0ec; --border-hi: #c8c8e0;
      --text: #0f0f1e; --muted: #8080a0; --muted-hi: #505070;
      --accent: #d4850a; --accent-dim: rgba(212,133,10,0.1); --accent-glow: rgba(212,133,10,0.2);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 14px; line-height: 1.5; min-height: 100vh;
      transition: background 0.3s, color 0.3s;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.04) 3px, rgba(0,0,0,0.04) 4px);
      pointer-events: none; z-index: 9997;
    }
    .navbar {
      position: sticky; top: 0; z-index: 100;
      background: rgba(7,7,12,0.92); backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem; height: 56px;
      display: flex; align-items: center; gap: 1.5rem;
    }
    [data-theme="light"] .navbar { background: rgba(244,244,248,0.92); }
    .logo { display: flex; align-items: center; gap: 0.6rem; text-decoration: none; }
    .logo-icon { width: 28px; height: 28px; background: var(--accent); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 15px; }
    .logo-text { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 15px; letter-spacing: 0.05em; color: var(--text); }
    .logo-text span { color: var(--accent); }
    .nav-divider { width: 1px; height: 20px; background: var(--border); }
    .nav-label { font-size: 11px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; font-family: 'JetBrains Mono', monospace; }
    .nav-spacer { flex: 1; }
    .nav-btn {
      background: transparent; border: 1px solid var(--border); color: var(--muted-hi);
      padding: 0 0.75rem; height: 30px; border-radius: 5px;
      font-size: 12px; font-family: 'Plus Jakarta Sans', sans-serif;
      cursor: pointer; display: flex; align-items: center; gap: 0.4rem;
      transition: all 0.15s; text-decoration: none; white-space: nowrap;
    }
    .nav-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
    .layout { max-width: 1200px; margin: 0 auto; padding: 2.5rem 1.5rem; }

    /* Year selector */
    .year-bar { display: flex; align-items: center; gap: 1rem; margin-bottom: 2rem; }
    .year-btn {
      background: var(--surface); border: 1px solid var(--border); color: var(--muted-hi);
      width: 32px; height: 32px; border-radius: 6px; cursor: pointer;
      font-size: 16px; display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .year-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
    .year-label { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 22px; }

    /* Calendar grid */
    .cal-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
    }

    .month-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
      overflow: hidden; cursor: pointer; transition: border-color 0.15s, transform 0.15s;
      position: relative;
    }
    .month-card:hover { border-color: var(--border-hi); transform: translateY(-2px); }
    .month-card.current { border-color: var(--accent); }
    .month-card.past { opacity: 0.65; }
    .month-card.has-promos { border-color: var(--green); }
    .month-card.current.has-promos { border-color: var(--accent); }

    .month-header {
      padding: 1rem 1.25rem 0.75rem;
      display: flex; align-items: flex-start; justify-content: space-between; gap: 0.5rem;
    }
    .month-emoji { font-size: 22px; line-height: 1; }
    .month-info { flex: 1; }
    .month-num { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }
    .month-name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 13px; margin-top: 2px; }
    .month-event { font-size: 11px; color: var(--muted-hi); margin-top: 2px; }
    .promo-count-badge {
      background: var(--green-dim); color: var(--green);
      border: 1px solid rgba(16,185,129,0.25);
      border-radius: 20px; font-family: 'JetBrains Mono', monospace;
      font-size: 11px; font-weight: 700;
      padding: 2px 8px; white-space: nowrap; flex-shrink: 0;
    }
    .promo-count-badge.zero { background: var(--border); color: var(--muted); border-color: var(--border); }

    .month-footer {
      padding: 0.6rem 1.25rem 0.75rem;
      border-top: 1px solid var(--border);
      display: flex; flex-wrap: wrap; gap: 0.3rem;
      min-height: 36px;
    }
    .promo-chip {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 4px; padding: 2px 7px;
      font-size: 10.5px; color: var(--muted-hi);
      max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .promo-chip.grade-Ap { border-color: rgba(16,185,129,0.3); color: #10b981; }
    .promo-chip.grade-A  { border-color: rgba(245,166,35,0.3); color: #f5a623; }
    .no-promos-hint { font-size: 11px; color: var(--muted); font-style: italic; }

    /* Current month indicator */
    .current-dot {
      position: absolute; top: 10px; right: 10px;
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent-glow);
    }

    /* Detail panel (slide in from side) */
    .detail-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
      display: none; align-items: flex-start; justify-content: flex-end;
    }
    .detail-overlay.open { display: flex; }
    .detail-panel {
      background: var(--surface); border-left: 1px solid var(--border);
      width: 480px; max-width: 95vw; height: 100vh;
      overflow-y: auto; padding: 2rem;
      animation: slideIn 0.2s ease;
    }
    @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
    .detail-close {
      background: var(--card); border: 1px solid var(--border); color: var(--muted-hi);
      width: 30px; height: 30px; border-radius: 6px; cursor: pointer;
      font-size: 14px; display: flex; align-items: center; justify-content: center;
      transition: all 0.15s; margin-bottom: 1.5rem;
    }
    .detail-close:hover { border-color: var(--red); color: var(--red); }
    .detail-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 20px; margin-bottom: 0.25rem; }
    .detail-subtitle { font-size: 12px; color: var(--muted-hi); margin-bottom: 1.5rem; }
    .promo-card-detail {
      background: var(--card); border: 1px solid var(--border); border-radius: 8px;
      padding: 0.875rem 1rem; margin-bottom: 0.75rem;
    }
    .promo-card-detail:hover { border-color: var(--border-hi); }
    .pcd-header { display: flex; align-items: flex-start; gap: 0.75rem; margin-bottom: 0.5rem; }
    .pcd-restaurant { font-weight: 600; font-size: 12px; color: var(--accent); }
    .pcd-type { font-size: 10px; color: var(--muted); background: var(--border); border-radius: 3px; padding: 1px 5px; }
    .pcd-details { font-size: 13px; color: var(--text); line-height: 1.5; }
    .pcd-meta { display: flex; align-items: center; gap: 0.75rem; margin-top: 0.5rem; }
    .pcd-price { font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 700; color: var(--green); }
    .grade-badge-sm { font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 700; padding: 1px 5px; border-radius: 3px; }
    .g-Ap { background: rgba(16,185,129,0.15); color: #10b981; }
    .g-A  { background: rgba(245,166,35,0.15); color: #f5a623; }
    .g-B  { background: rgba(99,102,241,0.15); color: #6366f1; }
    .g-C  { background: rgba(168,85,247,0.15); color: #a855f7; }
    .g-D  { background: rgba(239,68,68,0.15); color: #ef4444; }
    .empty-detail { text-align: center; padding: 3rem 1rem; color: var(--muted); }
    .empty-detail .empty-icon { font-size: 2.5rem; margin-bottom: 0.75rem; opacity: 0.4; }

    /* Legend */
    .legend { display: flex; gap: 1.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .legend-item { display: flex; align-items: center; gap: 0.4rem; font-size: 11.5px; color: var(--muted-hi); }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; }

    /* Lang */
    .fr, .en { display: none; }
    body.lang-fr .fr { display: inline; }
    body.lang-en .en { display: inline; }

    /* Loading */
    .loading { display: flex; align-items: center; justify-content: center; height: 300px; color: var(--muted); gap: 0.75rem; font-family: 'JetBrains Mono', monospace; }
    .spin { display: inline-block; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 1000px) { .cal-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 700px) { .cal-grid { grid-template-columns: repeat(2, 1fr); } .detail-panel { width: 100vw; } }
    @media (max-width: 480px) { .cal-grid { grid-template-columns: 1fr; } }

    /* Persistent job panel */
    #jobPanel { position: fixed; bottom: 1.5rem; right: 1.5rem; width: 380px; z-index: 9999; display: flex; flex-direction: column; gap: 0.75rem; }
    .job-card { background: var(--card); border: 1px solid var(--border-hi); border-radius: 10px; overflow: hidden; box-shadow: 0 8px 32px rgba(0,0,0,0.6); }
    .job-card-title { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0.6rem 0.875rem; display: flex; align-items: center; justify-content: space-between; }
    .job-card-name { font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 600; color: var(--accent); display: flex; align-items: center; gap: 0.5rem; }
    .job-card-close { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 14px; padding: 2px; border-radius: 3px; }
    .job-card-body { padding: 0.75rem 0.875rem; }
    .job-status { font-size: 12px; color: var(--muted-hi); margin-bottom: 0.5rem; }
    .job-logs { background: var(--bg); border: 1px solid var(--border); border-radius: 5px; font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--muted); padding: 0.5rem; height: 80px; overflow-y: auto; line-height: 1.6; }
  </style>
</head>
<body class="lang-fr">

<nav class="navbar">
  <a href="/" class="logo">
    <div class="logo-icon">🍗</div>
    <span class="logo-text">CHICKEN<span>.</span>WINGS</span>
  </a>
  <div class="nav-divider"></div>
  <span class="nav-label">
    <span class="fr">Calendrier</span><span class="en">Calendar</span>
  </span>
  <div class="nav-spacer"></div>
  <button class="nav-btn" onclick="toggleTheme()">◑</button>
  <button class="nav-btn" onclick="toggleLang()"><span class="fr">FR</span><span class="en">EN</span></button>
  <a href="/analytics" class="nav-btn"><span class="fr">Analyse</span><span class="en">Analytics</span></a>
  <a href="/" class="nav-btn"><span class="fr">Dashboard</span><span class="en">Dashboard</span></a>
</nav>

<div class="layout">
  <div class="year-bar">
    <button class="year-btn" onclick="changeYear(-1)">‹</button>
    <span class="year-label" id="yearLabel">2026</span>
    <button class="year-btn" onclick="changeYear(+1)">›</button>
    <span style="font-size:12px;color:var(--muted);margin-left:0.5rem">
      <span class="fr">— Cliquez sur un mois pour voir les promotions correspondantes</span>
      <span class="en">— Click a month to see matching promotions</span>
    </span>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div><span class="fr">Promos trouvées</span><span class="en">Promos found</span></div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--accent)"></div><span class="fr">Mois en cours</span><span class="en">Current month</span></div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--muted)"></div><span class="fr">Aucune promo trouvée</span><span class="en">No promos found</span></div>
  </div>

  <div id="jobPanel"></div>
<div id="loadingState" class="loading"><span class="spin">⟳</span> <span class="fr">Chargement…</span><span class="en">Loading…</span></div>
  <div id="calGrid" class="cal-grid" style="display:none"></div>
</div>

<!-- Detail panel -->
<div class="detail-overlay" id="detailOverlay" onclick="closeDetail(event)">
  <div class="detail-panel" id="detailPanel">
    <button class="detail-close" onclick="closeDetailBtn()">✕</button>
    <div class="detail-title" id="detailTitle"></div>
    <div class="detail-subtitle" id="detailSubtitle"></div>
    <div id="detailBody"></div>
  </div>
</div>

<script>
function toggleTheme() {
  const t = document.documentElement.getAttribute('data-theme') === 'light' ? null : 'light';
  if (t) document.documentElement.setAttribute('data-theme', t);
  else document.documentElement.removeAttribute('data-theme');
  localStorage.setItem('pref-theme', t || 'dark');
}
if (localStorage.getItem('pref-theme') === 'light') document.documentElement.setAttribute('data-theme', 'light');
function toggleLang() {
  const isEn = document.body.classList.toggle('lang-en');
  document.body.classList.toggle('lang-fr', !isEn);
  localStorage.setItem('pref-lang', isEn ? 'en' : 'fr');
}
if (localStorage.getItem('pref-lang') === 'en') { document.body.classList.add('lang-en'); document.body.classList.remove('lang-fr'); }

const MONTH_NAMES_FR = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
const MONTH_NAMES_EN = ['January','February','March','April','May','June','July','August','September','October','November','December'];

let currentYear = new Date().getFullYear();
let currentMonth = new Date().getMonth() + 1;
let calendarData = null;

function isEn() { return document.body.classList.contains('lang-en'); }

function gradeClass(g) {
  if (g === 'A+') return 'g-Ap'; if (g === 'A') return 'g-A';
  if (g === 'B')  return 'g-B';  if (g === 'C') return 'g-C';
  if (g === 'D')  return 'g-D';  return '';
}

function changeYear(delta) {
  currentYear += delta;
  document.getElementById('yearLabel').textContent = currentYear;
  loadCalendar();
}

async function loadCalendar() {
  document.getElementById('loadingState').style.display = 'flex';
  document.getElementById('calGrid').style.display = 'none';
  const resp = await fetch('/api/calendar?year=' + currentYear);
  const d = await resp.json();
  if (d.error) { document.getElementById('loadingState').textContent = 'Error: ' + d.error; return; }
  calendarData = d.events;
  renderCalendar(d.events);
}

function renderCalendar(events) {
  document.getElementById('loadingState').style.display = 'none';
  const grid = document.getElementById('calGrid');
  grid.style.display = '';
  grid.innerHTML = '';

  const lang = isEn() ? 'en' : 'fr';
  events.forEach(ev => {
    const isPast    = currentYear < new Date().getFullYear() || (currentYear === new Date().getFullYear() && ev.month < currentMonth);
    const isCurrent = currentYear === new Date().getFullYear() && ev.month === currentMonth;
    const hasPromos = ev.promo_count > 0;

    const card = document.createElement('div');
    card.className = 'month-card' + (isCurrent ? ' current' : '') + (isPast && !isCurrent ? ' past' : '') + (hasPromos ? ' has-promos' : '');

    const monthNames = lang === 'en' ? MONTH_NAMES_EN : MONTH_NAMES_FR;
    const eventName  = lang === 'en' ? ev.name_en : ev.name_fr;

    // Top 3 best promos for preview chips
    const topPromos = ev.promos.slice(0, 3);
    const chipsHtml = hasPromos
      ? topPromos.map(p => {
          const gc = p.grade === 'A+' ? 'grade-Ap' : p.grade === 'A' ? 'grade-A' : '';
          const label = p.promo_type || p.category || 'Promo';
          return `<span class="promo-chip ${gc}">${label}</span>`;
        }).join('') + (ev.promo_count > 3 ? `<span class="promo-chip">+${ev.promo_count - 3}</span>` : '')
      : `<span class="no-promos-hint">${lang === 'en' ? 'No promos yet' : 'Aucune promo'}</span>`;

    card.innerHTML = `
      ${isCurrent ? '<div class="current-dot"></div>' : ''}
      <div class="month-header">
        <div>
          <div class="month-num">${monthNames[ev.month - 1]}</div>
          <div class="month-name">${ev.emoji} ${eventName}</div>
        </div>
        <div class="promo-count-badge ${hasPromos ? '' : 'zero'}">${ev.promo_count} promo${ev.promo_count !== 1 ? 's' : ''}</div>
      </div>
      <div class="month-footer">${chipsHtml}</div>`;

    card.addEventListener('click', () => openDetail(ev));
    grid.appendChild(card);
  });
}

function openDetail(ev) {
  const lang = isEn() ? 'en' : 'fr';
  const monthNames = lang === 'en' ? MONTH_NAMES_EN : MONTH_NAMES_FR;
  const eventName  = lang === 'en' ? ev.name_en : ev.name_fr;

  document.getElementById('detailTitle').textContent = ev.emoji + '  ' + eventName;
  document.getElementById('detailSubtitle').textContent =
    monthNames[ev.month - 1] + ' · ' + ev.promo_count + (lang === 'en' ? ' matching promotion(s)' : ' promotion(s) correspondante(s)');

  const body = document.getElementById('detailBody');
  body.innerHTML = '';

  if (!ev.promos || ev.promos.length === 0) {
    body.innerHTML = `<div class="empty-detail">
      <div class="empty-icon">🗓️</div>
      <p>${lang === 'en' ? 'No promotions found for this season yet.' : 'Aucune promotion trouvée pour cette saison.'}</p>
    </div>`;
  } else {
    ev.promos.forEach(p => {
      const gc = gradeClass(p.grade);
      const activeLabel = p.is_active
        ? (lang === 'en' ? '✓ Active' : '✓ Active')
        : (lang === 'en' ? '⚬ Inactive' : '⚬ Inactive');
      const activeColor = p.is_active ? 'var(--green)' : 'var(--muted)';
      body.innerHTML += `
        <div class="promo-card-detail">
          <div class="pcd-header">
            <div style="flex:1">
              <div class="pcd-restaurant">${p.restaurant}</div>
              <div class="pcd-type">${p.promo_type || 'Promo'}</div>
            </div>
            <span class="grade-badge-sm ${gc}">${p.grade || '—'}</span>
          </div>
          <div class="pcd-details">${p.promo_details || '—'}</div>
          <div class="pcd-meta">
            ${p.price ? `<span class="pcd-price">$${p.price}</span>` : ''}
            <span style="font-size:11px;color:${activeColor}">${activeLabel}</span>
            ${p.category ? `<span style="font-size:11px;color:var(--muted)">${p.category}</span>` : ''}
          </div>
        </div>`;
    });
  }

  document.getElementById('detailOverlay').classList.add('open');
}

function closeDetail(e) { if (e.target === document.getElementById('detailOverlay')) closeDetailBtn(); }
function closeDetailBtn() { document.getElementById('detailOverlay').classList.remove('open'); }

// Re-render on lang toggle (override)
const origToggleLang = window.toggleLang;
window.toggleLang = function() {
  const isEn = document.body.classList.toggle('lang-en');
  document.body.classList.toggle('lang-fr', !isEn);
  localStorage.setItem('pref-lang', isEn ? 'en' : 'fr');
  if (calendarData) renderCalendar(calendarData);
};

document.getElementById('yearLabel').textContent = currentYear;
loadCalendar();

// ─── Restore scan jobs from other pages ───────────────────────────────────
(function() {
  const KEY = 'cw_jobs';
  function get() { try { return JSON.parse(sessionStorage.getItem(KEY)||'[]'); } catch { return []; } }
  function set(j) { sessionStorage.setItem(KEY, JSON.stringify(j)); }
  const fresh = get().filter(j => Date.now() - (j.ts||0) < 30*60*1000);
  set(fresh);
  fresh.forEach(j => {
    const panel = document.getElementById('jobPanel');
    const c = document.createElement('div'); c.className='job-card'; c.id='job-'+j.jid;
    c.innerHTML=`<div class="job-card-title"><span class="job-card-name"><span id="spin-${j.jid}" style="display:inline-block;animation:spin 1s linear infinite">⟳</span> ${j.name}</span><button class="job-card-close" onclick="this.closest('.job-card').remove()">✕</button></div><div class="job-card-body"><div class="job-status" id="jd-${j.jid}">En cours…</div><div class="job-logs" id="jl-${j.jid}"></div></div>`;
    panel.prepend(c);
    const ivl = setInterval(async () => {
      try {
        const [jr, lr] = await Promise.all([fetch('/job/'+j.jid), fetch('/api/job/'+j.jid+'/logs')]);
        const [job, logs] = await Promise.all([jr.json(), lr.json()]);
        const el = document.getElementById('jl-'+j.jid);
        if (el && logs.logs) { el.textContent=logs.logs.slice(-12).join('\n'); el.scrollTop=el.scrollHeight; }
        if (job.status==='done') {
          clearInterval(ivl); set(get().filter(x=>x.jid!==j.jid));
          const sp=document.getElementById('spin-'+j.jid); if(sp){sp.textContent='✓';sp.style.animation='none';sp.style.color='#10b981';}
          const det=document.getElementById('jd-'+j.jid); if(det) det.innerHTML=`+${(job.result||{}).inserted||0} nouvelles — terminé`;
        } else if (job.status==='error') {
          clearInterval(ivl); set(get().filter(x=>x.jid!==j.jid));
          const sp=document.getElementById('spin-'+j.jid); if(sp){sp.textContent='✗';sp.style.animation='none';sp.style.color='var(--red)';}
          const det=document.getElementById('jd-'+j.jid); if(det) det.innerHTML=`<span style="color:var(--red)">${job.error||'Erreur'}</span>`;
        }
      } catch(e) {}
    }, 2500);
  });
})();
</script>
</body>
</html>
