version: '3.8'

services:

  app:
    build: .
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      DB_USER: root
      DB_PASSWORD: "${DB_PASSWORD:-1234}"
      DB_NAME: promotions_db
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    shm_size: '256mb'

  gatekeeper:
    image: nginx:alpine
    ports:
      - "80:80"
    environment:
      BUNKER_PASSWORD: "${BUNKER_PASSWORD:-sx0y58n0ufm5}"
    volumes:
      - ./nginx_bunker.conf:/etc/nginx/conf.d/default.conf:ro
      - ./htpasswd:/etc/nginx/.htpasswd:ro
    depends_on:
      - app

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: "${DB_PASSWORD:-1234}"
      MYSQL_DATABASE: promotions_db
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost",
             "-uroot", "-p${DB_PASSWORD:-1234}"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped

volumes:
  mysql_data:
