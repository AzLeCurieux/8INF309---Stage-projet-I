services:

  app:
    build: .
    ports:
      - "8500:5000"
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      DB_USER: root
      DB_PASSWORD: "${DB_PASSWORD:-1234}"
      DB_NAME: promotions_db
      SECRET_KEY: "${SECRET_KEY:-change-me-in-production-use-a-long-random-string}"
      MAIL_SERVER: "${MAIL_SERVER:-}"
      MAIL_PORT: "${MAIL_PORT:-587}"
      MAIL_USE_TLS: "${MAIL_USE_TLS:-true}"
      MAIL_USERNAME: "${MAIL_USERNAME:-}"
      MAIL_PASSWORD: "${MAIL_PASSWORD:-}"
      MAIL_DEFAULT_SENDER: "${MAIL_DEFAULT_SENDER:-noreply@chickenwings.local}"
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID:-}"
      GOOGLE_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET:-}"
      GITHUB_CLIENT_ID: "${GITHUB_CLIENT_ID:-}"
      GITHUB_CLIENT_SECRET: "${GITHUB_CLIENT_SECRET:-}"
      GOOGLE_MAPS_API_KEY: "${GOOGLE_MAPS_API_KEY:-}"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    shm_size: '256mb'

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: "${DB_PASSWORD:-1234}"
      MYSQL_DATABASE: promotions_db
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost",
             "-uroot", "-p${DB_PASSWORD:-1234}"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped

volumes:
  mysql_data:
